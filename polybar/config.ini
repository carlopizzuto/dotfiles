;==========================================================
;
;   Polybar Configuration - Gruvbox Dark Theme
;
;==========================================================

[colors]
; Gruvbox Dark colors
background = #282828
background-alt = #3c3836
foreground = #ebdbb2
foreground-dim = #a89984
primary = #fabd2f
secondary = #8ec07c
alert = #fb4934
warning = #fe8019
green = #b8bb26
blue = #83a598
purple = #d3869b

[settings]
screenchange-reload = true
pseudo-transparency = false

;==========================================================
; BAR - Main Monitor (DP-2)
;==========================================================

[bar/main]
monitor = DP-2
width = 100%
height = 34
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1
font-0 = Iosevka Nerd Font:size=13;3
font-1 = Symbols Nerd Font Mono:size=10;3
modules-left = i3
modules-center = date interpunct time
modules-right = network-speed sep cpu sep memory sep gpu sep disk sep power-menu

;==========================================================
; BAR - Portrait Monitor (DP-0)
;==========================================================

[bar/portrait]
monitor = DP-0
width = 100%
height = 34
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1
font-0 = Iosevka Nerd Font:size=13;3
font-1 = Symbols Nerd Font Mono:size=10;3
modules-left = i3
modules-center = time
modules-right = cpu-simple sep gpu-simple sep memory-simple

;==========================================================
; MODULES
;==========================================================

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
pin-workspaces = true

; Focused workspace
label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

; Unfocused workspace
label-unfocused = %index%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.foreground-dim}

; Visible but not focused
label-visible = %index%
label-visible-background = ${colors.background-alt}
label-visible-padding = 2

; Urgent workspace
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %A %b. %d, %Y
label = %date%
format-foreground = ${colors.foreground}

[module/time]
type = internal/date
interval = 1
time = %H:%M:%S
label = %time%
format-foreground = ${colors.foreground}

[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/cpu.sh
interval = 2
format-foreground = ${colors.green}

[module/cpu-simple]
type = custom/script
exec = ~/.config/polybar/scripts/cpu-simple.sh
interval = 2
format-foreground = ${colors.green}

[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/memory.sh
interval = 2
format-foreground = ${colors.blue}

[module/memory-simple]
type = custom/script
exec = ~/.config/polybar/scripts/memory-simple.sh
interval = 2
format-foreground = ${colors.blue}

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu.sh
interval = 2
format-foreground = ${colors.purple}

[module/gpu-simple]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-simple.sh
interval = 2
format-foreground = ${colors.purple}

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
format-mounted = <label-mounted>
label-mounted = D: %used%/%total%
format-mounted-foreground = ${colors.secondary}

[module/temperature]
type = custom/script
exec = ~/.config/polybar/scripts/temp.sh
interval = 2
format-foreground = ${colors.warning}
label = %output%

[module/network-speed]
type = internal/network
interface-type = wired
interval = 3
format-connected = <label-connected>
label-connected = %ifname% %local_ip%
format-connected-foreground = ${colors.foreground}
format-disconnected = <label-disconnected>
label-disconnected = disconnected
format-disconnected-foreground = ${colors.foreground-dim}

[module/sep]
type = custom/text
format = |
format-foreground = ${colors.foreground-dim}

[module/interpunct]
type = custom/text
format = ·
format-foreground = ${colors.foreground-dim}

[module/space]
type = custom/text
format = "      "

[module/power-menu]
type = custom/text
format = 
format-foreground = ${colors.primary}
click-left = ~/.config/polybar/scripts/power-menu.sh
