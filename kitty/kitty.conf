# Hide macOS titlebar but keep normal window shape
hide_window_decorations titlebar-only

include themes/gruvbox.conf

font_family		Iosevka Nerd Font	
bold_font			auto
italic_font		auto
bold_italic_font	auto
font_size 		10

fallback_family  Nerd Font Symbols Mono, Noto Sans Symbols, Noto Color Emoji, Unifont

map ctrl+v paste_from_clipboard
map ctrl+shift+r load_config_file
copy_on_select yes

# Send Shift+Enter as a distinct sequence so tmux/apps can detect it
map shift+enter send_text all \x1b[13;2u

tab_bar_min_tabs		2
tab_bar_edge			bottom
tab_bar_style			powerline
tab_powerline_style		slanted
tab_title_template		{title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}


window_padding_width		5 10 10 10
