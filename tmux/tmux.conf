# Set prefix key to Ctrl-a instead of default Ctrl-b
unbind C-b
set -g prefix C-a

# Ctrl-a Ctrl-a to send literal Ctrl-a
bind C-a send-prefix

# prefix + tab to cycle to next window
bind Tab next-window

# prefix + Shift+tab to cycle to previous window
bind BTab previous-window

# Set window index start to 1
set -g base-index 1

# Set pane index start to 1
set -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Pass through extended keys (e.g. Shift+Enter) to applications
set -s extended-keys always
set -as terminal-features 'xterm-kitty:extkeys'

# Allow passthrough sequences (kitty graphics, etc.)
set -g allow-passthrough on

# Clipboard: enable OSC 52 (copy works through SSH/tmux to system clipboard)
set -s set-clipboard on

# Auto-rename windows to the running command (SSH wrapper overrides for SSH panes)
set -g automatic-rename on

# Status bar on top
set -g status-position top

# ---------------------------------------------------------------------------
# Gruvbox status bar (per-host accent color)
# ---------------------------------------------------------------------------
set -g status-style 'bg=#282828,fg=#ebdbb2'
set -g status-left-length 30
set -g status-right-length 80
set -g status-interval 5
set -g window-status-format '#[fg=#a89984] #I:#W '
set -g window-status-separator ''
set -g pane-border-style 'fg=#504945'

# Per-host accent: macOS = blue (#83a598), Linux/Arch = yellow (#fabd2f)
if-shell '[ "$(uname -s)" = "Darwin" ]' {
  set -g status-left '#[fg=#282828,bg=#83a598,bold]  #S #[fg=#83a598,bg=#282828,nobold] '
  set -g status-right '#(gitmux -cfg ~/.dotfiles/tmux/gitmux.conf "#{pane_current_path}") #[fg=#83a598] #{@pane_host} #[fg=#a89984]#{pane_title}  %H:%M  %d %b '
  set -g window-status-current-format '#[fg=#282828,bg=#83a598,bold] #I:#W #[fg=#83a598,bg=#282828,nobold]'
  set -g pane-active-border-style 'fg=#83a598'
} {
  set -g status-left '#[fg=#282828,bg=#fabd2f,bold]  #S #[fg=#fabd2f,bg=#282828,nobold] '
  set -g status-right '#(gitmux -cfg ~/.dotfiles/tmux/gitmux.conf "#{pane_current_path}") #[fg=#fabd2f] #{@pane_host} #[fg=#a89984]#{pane_title}  %H:%M  %d %b '
  set -g window-status-current-format '#[fg=#282828,bg=#fabd2f,bold] #I:#W #[fg=#fabd2f,bg=#282828,nobold]'
  set -g pane-active-border-style 'fg=#fabd2f'
}

# Split panes with | and _
bind | split-window -h
bind _ split-window -v

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# DISABLE auto-restore (use tmuxinator for managed sessions)
set -g @continuum-restore 'off'

# Auto-save every 15 minutes (optional, keeps saves fresh)
set -g @continuum-save-interval '15'

# Set the base directory for saving/restoring sessions
set -g @resurrect-dir '~/.local/share/tmux/resurrect'

# Manual restore: prefix + Ctrl-r
# Manual save: prefix + Ctrl-s (default from resurrect)

# Initialize TPM !!! keep as the very last line !!!
run '~/.tmux/plugins/tpm/tpm'
